name: embedded-python CI

# Runs pytest against the Python files shipped with gh-teacher:
#
#   - cli/gh-teacher/skeleton/dotgithub/scripts/collect_scores.py
#     (score collector scaffolded by `gh teacher init`; runs inside
#     collect-scores.yaml)
#   - cli/gh-teacher/skeleton/dotgithub/scripts/runner.py
#     (runner-side bootstrap scaffolded by `gh teacher init`;
#     fetched at workflow runtime by the autograde-runner reusable
#     workflow and execs the autograder)
#   - cli/gh-teacher/embed/autograder.py
#     (diagnostic-stub autograder //go:embed-ed into gh-teacher;
#     written to <classroom>/autograder.py only when teachers run
#     `gh teacher autograder set-default` without --from)
#
# Tests live alongside each script (skeleton_tests/, autograders_tests/)
# but are NOT embedded into the teacher's classroom50 repo — they
# only exist to gate changes here.

on:
  push:
    branches: [main, v1]
    paths:
      - 'cli/gh-teacher/skeleton/dotgithub/scripts/**'
      - 'cli/gh-teacher/skeleton/dotgithub/workflows/collect-scores.yaml'
      - 'cli/gh-teacher/skeleton/dotgithub/workflows/autograde-runner.yaml'
      - 'cli/gh-teacher/embed/**'
      - 'cli/gh-teacher/skeleton_tests/**'
      - 'cli/gh-teacher/autograders_tests/**'
      - '.github/workflows/skeleton-scripts-ci.yaml'
  pull_request:
    paths:
      - 'cli/gh-teacher/skeleton/dotgithub/scripts/**'
      - 'cli/gh-teacher/skeleton/dotgithub/workflows/collect-scores.yaml'
      - 'cli/gh-teacher/skeleton/dotgithub/workflows/autograde-runner.yaml'
      - 'cli/gh-teacher/embed/**'
      - 'cli/gh-teacher/skeleton_tests/**'
      - 'cli/gh-teacher/autograders_tests/**'
      - '.github/workflows/skeleton-scripts-ci.yaml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test deps
        run: python -m pip install --quiet pytest pyyaml

      - name: Run collect_scores tests
        run: python -m pytest cli/gh-teacher/skeleton_tests/ -v

      - name: Run autograde tests
        run: python -m pytest cli/gh-teacher/autograders_tests/ -v

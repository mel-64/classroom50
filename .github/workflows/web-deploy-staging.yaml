name: web Deploy to Staging (staging.classroom50.org)

# Builds the web app (web/) and publishes the built dist/ to the separate
# staging repo (foundation50/classroom50-web-staging), whose GitHub Pages
# serves staging.classroom50.org.
#
# DORMANT BY DESIGN (monorepo migration): this is `workflow_dispatch`-only for
# now. In the standalone web repo this fired on push to `staging`; that branch
# model doesn't exist here (this repo's long-lived branch is `v1`). Re-wire the
# trigger as part of the deployment cutover once the monorepo owns publishing.
#
# Why a separate repo: GitHub Pages allows only one custom domain per repo, so
# production (classroom50.org) and staging must live in different repos. Source
# stays here; the staging repo holds only the built artifact + its own CNAME.

on:
  workflow_dispatch:

# Only the cross-repo push needs auth (provided via STAGING_DEPLOY_KEY); this
# workflow does not use the local repo's GITHUB_TOKEN to write anything.
permissions:
  contents: read

concurrency:
  group: web-deploy-staging
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # `npm run build` runs `tsc -b && vite build`; the type-check is
      # blocking. Served from the root of staging.classroom50.org, so the
      # default base of "/" is correct.
      - run: npm run build
        env:
          # Staging-specific OAuth client ID. This is a public identifier (not
          # a secret), set as a repo *variable* so the staging app points at
          # the staging OAuth app registered for staging.classroom50.org.
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_STAGING_GITHUB_CLIENT_ID }}

      # GitHub Pages has no SPA rewrites; serve the app for unknown deep links.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      # Custom domain for the staging Pages site. Written into the published
      # artifact so the staging repo's Pages keeps serving the subdomain.
      - name: Write CNAME for staging domain
        run: echo "staging.classroom50.org" > dist/CNAME

      # Publish the built site to the staging repo's `main` branch (its Pages
      # source). Uses an SSH deploy key (least privilege, no expiry) that has
      # write access to ONLY the staging repo.
      - name: Publish to staging repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.STAGING_DEPLOY_KEY }}
          external_repository: foundation50/classroom50-web-staging
          publish_branch: main
          # Repo-root-relative; the build wrote to web/dist.
          publish_dir: ./web/dist
          # Replace the branch contents wholesale each deploy (the staging repo
          # holds only the built artifact, no source history worth keeping).
          force_orphan: true
          full_commit_message: "deploy: staging.classroom50.org from ${{ github.sha }}"

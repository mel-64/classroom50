name: gh-teacher CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/gh-teacher/**'
      - 'cli/shared/**'
      - '.github/workflows/gh-teacher-ci.yaml'
  pull_request:
    paths:
      - 'cli/gh-teacher/**'
      - 'cli/shared/**'
      - '.github/workflows/gh-teacher-ci.yaml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli/gh-teacher
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/gh-teacher/go.mod
          cache-dependency-path: cli/gh-teacher/go.sum

      - name: Verify go.mod / go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: cli/gh-teacher
          version: v2.11.4

      - name: Format (gofmt + goimports)
        run: |
          diff=$(golangci-lint fmt --diff)
          if [ -n "$diff" ]; then
            echo "::error::Formatter diffs detected (run \`golangci-lint fmt\` locally to apply):"
            echo "$diff"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Single go-gh importer guard
        # The GitHub REST API seam (internal/githubapi) is the ONLY
        # package allowed to import go-gh; internal/githubtest may too
        # because it constructs real clients for white-box tests. Any
        # other non-test file importing it means a domain package
        # reached around the seam — fail the build.
        run: |
          offenders=$(grep -rl --include='*.go' 'github.com/cli/go-gh/v2/pkg/api' . \
            | grep -v '_test\.go$' \
            | grep -v '^\./internal/githubapi/' \
            | grep -v '^\./internal/githubtest/' || true)
          if [ -n "$offenders" ]; then
            echo "::error::go-gh/api may only be imported by internal/githubapi (and internal/githubtest for test clients). Offending files:"
            echo "$offenders"
            exit 1
          fi

      - name: Test
        run: go test ./...

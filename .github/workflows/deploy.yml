name: Deploy to GitHub Pages

on:
  push:
    branches: [main, github-pages-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `npm run build` runs `tsc -b && vite build`; the type-check is now
      # blocking (the strict-mode errors were fixed), so a regression fails the
      # deploy instead of silently shipping. Served from the root of the custom
      # domain (classroom50.org), so the default base of "/" is correct.
      - run: npm run build
        env:
          # OAuth client IDs are public identifiers, so a repo variable
          # (Settings -> Secrets and variables -> Actions -> Variables)
          # is sufficient; no secret needed.
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}

      # GitHub Pages has no SPA rewrites; serve the app for unknown deep links.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

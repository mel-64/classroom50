name: Deploy to GitHub Pages

on:
  push:
    branches: [main, github-pages-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # vite build directly (instead of "npm run build") skips the tsc
      # typecheck, which currently fails on pre-existing errors. The site
      # is served from the root of the custom domain (classroom50.org),
      # so the default base of "/" is correct.
      - run: npx vite build

      # GitHub Pages has no SPA rewrites; serve the app for unknown deep links.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Classroom50 Autograde Library

# Reusable autograde workflow consumed by per-classroom autograders
# (e.g. `<classroom>/autograders/default.yml`) in any teaching org's
# `classroom50` config repo. Lives at
# `foundation50/classroom50/.github/workflows/autograde-library.yml`
# so cross-org `uses: foundation50/classroom50/...@<ref>` resolves.
#
# Contract (every caller must satisfy this, the library will not
# replay these guarantees):
#
#   1. Trigger on `push.tags: ["submit/*"]` from a student repo
#      created by `gh student accept`. The student repo's root must
#      contain `.classroom50.yml` with `classroom`, `assignment`, and
#      `config.{owner,repo,path}` populated.
#   2. Declare `permissions: contents: write` (release publish) and
#      `statuses: write` (commit status), or `permissions: inherit`.
#
# On completion this library publishes a Release at the submit tag
# carrying a `result.json` asset and posts a `classroom50/autograde`
# commit status. Both are the contract `collect-scores.yml` reads
# to populate `<classroom>/scores.json`. The asset name is fixed
# (`result.json`) so the collector can address the latest result
# deterministically via `/repos/.../releases/latest`.

on:
  workflow_call:

permissions:
  contents: write
  statuses: write

jobs:
  load:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.load.outputs.tests }}
      assignment: ${{ steps.load.outputs.assignment }}
      classroom: ${{ steps.load.outputs.classroom }}
      org: ${{ steps.load.outputs.org }}
      max_score: ${{ steps.load.outputs.max_score }}
    steps:
      - uses: actions/checkout@v6

      # PyYAML ships pre-installed on every ubuntu-latest image
      # today, but it isn't part of the public Actions runner
      # contract — guarantee it explicitly so the load step doesn't
      # start failing the day the base image drops it.
      - name: Ensure PyYAML
        run: python3 -m pip install --quiet --user pyyaml

      - id: load
        name: Resolve assignment and tests from Pages
        shell: python3 {0}
        run: |
          # Parse the student repo's `.classroom50.yml`, then fetch
          # the teacher's `assignments.json` from Pages (unauth — the
          # publish-pages allow-list keeps the manifest readable).
          # Per-test entries flow into the matrix step as a JSON
          # string output, sized by the published manifest.
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          import yaml

          try:
              with open(".classroom50.yml") as fh:
                  cfg = yaml.safe_load(fh) or {}
          except FileNotFoundError:
              print("::error::.classroom50.yml not found at repo root — was this repo created by `gh student accept`?", file=sys.stderr)
              sys.exit(1)

          classroom = (cfg.get("classroom") or "").strip()
          assignment = (cfg.get("assignment") or "").strip()
          if not classroom or not assignment:
              print("::error::.classroom50.yml is missing required keys `classroom` and/or `assignment`", file=sys.stderr)
              sys.exit(1)

          conf = cfg.get("config") or {}
          owner = (conf.get("owner") or "").strip()
          repo = (conf.get("repo") or "classroom50").strip()
          path = (conf.get("path") or classroom).strip()
          if not owner:
              print("::error::.classroom50.yml is missing `config.owner` (the teaching org) — re-run `gh student accept` to refresh metadata", file=sys.stderr)
              sys.exit(1)

          url = f"https://{owner}.github.io/{repo}/{path}/assignments.json"
          print(f"Fetching {url}")
          req = urllib.request.Request(url, headers={"Accept": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read()
          except urllib.error.HTTPError as exc:
              print(f"::error::GET {url}: HTTP {exc.code} — ask your instructor to confirm `publish-pages.yml` has run on {owner}/{repo}", file=sys.stderr)
              sys.exit(1)
          except urllib.error.URLError as exc:
              print(f"::error::GET {url}: {exc} — the Pages site may not be deployed yet", file=sys.stderr)
              sys.exit(1)

          file = json.loads(body)
          if file.get("schema") != "classroom50/assignments/v1":
              print(f"::error::{url} schema = {file.get('schema')!r}, want classroom50/assignments/v1 — update the autograde library", file=sys.stderr)
              sys.exit(1)

          entry = None
          for candidate in file.get("assignments") or []:
              if candidate.get("slug") == assignment:
                  entry = candidate
                  break
          if entry is None:
              print(f"::error::assignment {assignment!r} is not registered in {url} — ask your instructor to run `gh teacher assignment add {owner} {classroom} {assignment}`", file=sys.stderr)
              sys.exit(1)

          tests = entry.get("tests") or []
          # Normalize optional fields to empty strings so the matrix
          # step's `with:` block never resolves to a literal `null`
          # (the autograding actions reject null inputs).
          for t in tests:
              for k in ("setup-command", "input", "expected-output", "comparison-method", "test-description"):
                  if t.get(k) is None:
                      t[k] = ""

          max_score = sum(int(t.get("max-score") or 0) for t in tests)
          gh_output = os.environ.get("GITHUB_OUTPUT")
          if not gh_output:
              print("::error::GITHUB_OUTPUT is not set; cannot emit job outputs", file=sys.stderr)
              sys.exit(1)
          with open(gh_output, "a") as fh:
              fh.write(f"assignment={assignment}\n")
              fh.write(f"classroom={classroom}\n")
              fh.write(f"org={owner}\n")
              fh.write(f"max_score={max_score}\n")
              # tests is a single JSON line; matrix expansion uses
              # `fromJSON()` on this string in the run job below.
              fh.write(f"tests={json.dumps(tests)}\n")

  run:
    needs: load
    # Skip cleanly when an assignment ships no tests — the matrix
    # would otherwise expand to zero jobs anyway, but the explicit
    # guard makes the report job's `needs.run.result` distinguish
    # "no tests configured" from "all tests failed".
    if: ${{ needs.load.outputs.tests != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.load.outputs.tests) }}
    steps:
      - uses: actions/checkout@v6

      - id: io
        if: ${{ matrix.test['test-type'] == 'input_output' }}
        continue-on-error: true
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: ${{ matrix.test['test-name'] }}
          setup-command: ${{ matrix.test['setup-command'] }}
          command: ${{ matrix.test['command'] }}
          input: ${{ matrix.test['input'] }}
          expected-output: ${{ matrix.test['expected-output'] }}
          comparison-method: ${{ matrix.test['comparison-method'] }}
          timeout: ${{ matrix.test['timeout'] }}
          max-score: ${{ matrix.test['max-score'] }}

      - id: cmd
        if: ${{ matrix.test['test-type'] == 'run_command' }}
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: ${{ matrix.test['test-name'] }}
          setup-command: ${{ matrix.test['setup-command'] }}
          command: ${{ matrix.test['command'] }}
          timeout: ${{ matrix.test['timeout'] }}
          max-score: ${{ matrix.test['max-score'] }}

      - name: Surface unknown test-type
        if: ${{ matrix.test['test-type'] != 'input_output' && matrix.test['test-type'] != 'run_command' }}
        env:
          # Pass via env vars (NOT inline `${{ }}` interpolation)
          # so a teacher-controlled test-name/type can't break out
          # of the shell quoting and execute arbitrary commands
          # with the workflow's contents:write token.
          TEST_TYPE: ${{ matrix.test['test-type'] }}
          TEST_NAME: ${{ matrix.test['test-name'] }}
        run: |
          set -euo pipefail
          # Exit 0 on purpose — the failure is recorded in result.json
          # (passed: false) by the Record step below and aggregated by
          # the report job. Exiting non-zero here would skip Record +
          # Upload and reduce the failure to "matrix ran but produced
          # no artifact for this test", which the report job can't
          # distinguish from a missing test in the manifest.
          echo "::error title=Unknown test-type::Test '${TEST_NAME}' uses test-type '${TEST_TYPE}'. The autograde library only handles 'input_output' and 'run_command'. Ask your instructor to update the test definition via 'gh teacher assignment add'."

      - name: Record per-test result
        if: ${{ always() }}
        env:
          TEST_JSON: ${{ toJSON(matrix.test) }}
          IO_OUTCOME: ${{ steps.io.outcome }}
          CMD_OUTCOME: ${{ steps.cmd.outcome }}
        shell: python3 {0}
        run: |
          # Map the chosen action step's outcome (`success` or
          # `failure` — `continue-on-error: true` keeps the job
          # alive either way) into a uniform result file consumed
          # by the report job. Unknown test-types record passed=false
          # so the failure flows through result.json + the release
          # body + the commit status uniformly.
          import json
          import os
          import pathlib

          test = json.loads(os.environ["TEST_JSON"])
          tt = test.get("test-type", "")
          if tt == "input_output":
              outcome = os.environ.get("IO_OUTCOME", "")
          elif tt == "run_command":
              outcome = os.environ.get("CMD_OUTCOME", "")
          else:
              outcome = "failure"

          max_score = int(test.get("max-score") or 0)
          passed = outcome == "success"
          result = {
              "test-name": test.get("test-name", ""),
              "passed": passed,
              "score": max_score if passed else 0,
              "max-score": max_score,
          }
          tmp = pathlib.Path(os.environ["RUNNER_TEMP"]) / "result.json"
          tmp.write_text(json.dumps(result))
          print(json.dumps(result))

      - name: Upload per-test result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: classroom50-result-${{ strategy.job-index }}
          path: ${{ runner.temp }}/result.json
          if-no-files-found: error
          retention-days: 7

  report:
    needs: [load, run]
    # Always run so the commit status lands even when `load` failed
    # (Pages 404, schema mismatch, etc.) — the student would
    # otherwise see no `classroom50/autograde` status at all and
    # collect-scores has no signal to act on.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download per-test results
        if: ${{ needs.run.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          pattern: classroom50-result-*
          path: results

      - id: build
        name: Build result.json
        # Skipped on load failure — result.json can't be built
        # without the classroom / assignment / max_score outputs.
        # The Post commit status step below uses the
        # `steps.build.outputs.* || 'error'` fallbacks to surface
        # the failure regardless.
        if: ${{ needs.load.result == 'success' }}
        env:
          CLASSROOM: ${{ needs.load.outputs.classroom }}
          ASSIGNMENT: ${{ needs.load.outputs.assignment }}
          MAX_SCORE: ${{ needs.load.outputs.max_score }}
          SUBMISSION_TAG: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          ACTOR: ${{ github.actor }}
          RUN_RESULT: ${{ needs.run.result }}
        shell: python3 {0}
        run: |
          # Aggregate per-test artifacts into the result.json
          # contract: collect-scores.yml reads this asset from each
          # submit-tag release verbatim, so the keys and shape are
          # the public contract.
          import datetime
          import json
          import os
          import pathlib
          import urllib.parse

          classroom = os.environ["CLASSROOM"]
          assignment = os.environ["ASSIGNMENT"]
          max_score = int(os.environ.get("MAX_SCORE") or 0)
          submission = os.environ["SUBMISSION_TAG"]
          commit = os.environ["COMMIT_SHA"]
          server_url = os.environ["SERVER_URL"]
          repository = os.environ["REPOSITORY"]
          actor = os.environ["ACTOR"]
          run_result = os.environ.get("RUN_RESULT", "")

          results_dir = pathlib.Path("results")
          tests = []
          if results_dir.is_dir():
              for path in sorted(results_dir.rglob("result.json")):
                  with path.open() as fh:
                      tests.append(json.load(fh))
          score = sum(int(t.get("score") or 0) for t in tests)

          # Student usernames are derived from the repo name
          # (`<classroom>-<assignment>-<username>`, lowercased by
          # `gh student accept`) so a TA pushing the submit tag on
          # the student's behalf still credits the student. Fall
          # back to github.actor when the repo doesn't follow the
          # convention (e.g. a hand-created repo for testing).
          owner_repo = repository.split("/", 1)
          repo_name = owner_repo[1] if len(owner_repo) == 2 else repository
          prefix = f"{classroom}-{assignment}-".lower()
          if repo_name.lower().startswith(prefix):
              usernames = [repo_name[len(prefix):]]
          else:
              usernames = [actor]

          release_path = f"releases/tag/{urllib.parse.quote(submission, safe='')}"
          commit_path = f"commit/{commit}"
          repo_url = f"{server_url}/{repository}"
          payload = {
              "schema": "classroom50/result/v1",
              "classroom": classroom,
              "assignment": assignment,
              "usernames": usernames,
              "submission": submission,
              "commit": f"{repo_url}/{commit_path}",
              "release": f"{repo_url}/{release_path}",
              "review": f"{repo_url}/{commit_path}",
              "datetime": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "score": score,
              "max-score": max_score,
              "tests": tests,
          }
          pathlib.Path("result.json").write_text(json.dumps(payload, indent=2) + "\n")
          print(json.dumps(payload, indent=2))

          # Emit summary outputs for the commit status / release body.
          # Three distinct cases the report has to keep separate:
          #   run_result == 'skipped' → manifest had `tests: []`,
          #                             matrix expanded to zero jobs,
          #                             vacuously a pass.
          #   tests is empty otherwise → the matrix ran but every
          #                              attempt failed before
          #                              uploading; surface as error.
          #   tests has rows → normal pass/fail aggregation.
          all_passed = bool(tests) and all(t.get("passed") for t in tests)
          if run_result == "skipped":
              status = "success"
              summary = f"Classroom50 autograde: no tests configured for {assignment}"
          elif not tests:
              status = "error"
              summary = f"Classroom50 autograde: matrix run produced no results (check the run logs)"
          elif all_passed:
              status = "success"
              summary = f"Classroom50 autograde: {score}/{max_score} (all tests passed)"
          else:
              status = "failure"
              passed_count = sum(1 for t in tests if t.get("passed"))
              summary = f"Classroom50 autograde: {score}/{max_score} ({passed_count}/{len(tests)} tests passed)"

          # Render the release-body markdown next to the JSON so the
          # release step can use a file rather than escaping a long
          # string through the shell.
          lines = [
              f"### Classroom50 autograde: {score}/{max_score}",
              "",
          ]
          if tests:
              lines.extend(["| Test | Result | Score |", "|---|---|---|"])
              for t in tests:
                  ok = "PASS" if t.get("passed") else "FAIL"
                  # Escape `|` in test-names so they don't break the
                  # Markdown table rendering on the release page.
                  test_name = (t.get("test-name") or "").replace("|", "\\|")
                  lines.append(
                      f"| {test_name} | {ok} | "
                      f"{int(t.get('score') or 0)} / {int(t.get('max-score') or 0)} |"
                  )
              lines.append("")
              lines.append(f"Status: {'all tests passed' if all_passed else 'some tests failed'}.")
          elif run_result == "skipped":
              lines.append("_No tests are configured for this assignment._")
          else:
              lines.append("_The autograde run produced no results — check the workflow logs._")
          pathlib.Path("release-body.md").write_text("\n".join(lines) + "\n")

          gh_output = os.environ["GITHUB_OUTPUT"]
          with open(gh_output, "a") as fh:
              fh.write(f"status={status}\n")
              fh.write(f"summary={summary}\n")

      - name: Post commit status
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          STATUS_STATE: ${{ steps.build.outputs.status || 'error' }}
          STATUS_SUMMARY: ${{ steps.build.outputs.summary || 'Classroom50 autograde failed to load tests' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh api "repos/${OWNER_REPO}/statuses/${COMMIT_SHA}" \
            -f "state=${STATUS_STATE}" \
            -f "context=classroom50/autograde" \
            -f "description=${STATUS_SUMMARY}" \
            -f "target_url=${RUN_URL}"

      - name: Publish submit-tag release
        if: ${{ startsWith(github.ref, 'refs/tags/submit/') && steps.build.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER_REPO: ${{ github.repository }}
          SUBMISSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Re-runnable: a re-triggered workflow (e.g. after fixing a
          # flaky test or upstream outage) updates the existing
          # release in place rather than aborting on
          # `release already exists`.
          if gh release view "${SUBMISSION_TAG}" --repo "${OWNER_REPO}" >/dev/null 2>&1; then
            gh release edit "${SUBMISSION_TAG}" --repo "${OWNER_REPO}" \
              --title "Submission ${SUBMISSION_TAG}" \
              --notes-file release-body.md
            gh release upload "${SUBMISSION_TAG}" result.json \
              --repo "${OWNER_REPO}" --clobber
          else
            gh release create "${SUBMISSION_TAG}" result.json \
              --repo "${OWNER_REPO}" \
              --title "Submission ${SUBMISSION_TAG}" \
              --notes-file release-body.md
          fi

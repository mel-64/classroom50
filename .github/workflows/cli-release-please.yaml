name: cli Release Please

# Automates CLI extension releases with googleapis/release-please. Day-to-day
# work lands on `main` (all PRs merge straight into main). This workflow watches
# `main` and maintains a *Release PR* that bumps `cli/CHANGELOG.md` from
# Conventional Commits. Merging that Release PR creates the `cli-vX.Y.Z` tag,
# which the existing `cli-release.yaml` workflow consumes to build and publish
# the `gh-teacher` and `gh-student` extensions.
#
# Monorepo-scoped to `cli/` via release-please-config.json +
# .release-please-manifest.json (the `cli` package key IS the path). The
# `cli-v*` tag scheme is namespaced apart from the web app's `web-v*` tags.
#
# Token model: release-please runs with CLI_RELEASE_PAT (an admin PAT), NOT the
# default GITHUB_TOKEN. The `cli-release-tags` ruleset restricts `cli-v*` tag
# creation to the Admin role, and github-actions[bot] can't be granted a repo-
# level bypass here (org policy), so the bot's GITHUB_TOKEN cannot create the
# tag. An admin PAT satisfies the Admin-role bypass. A side benefit: a tag
# pushed by a PAT DOES retrigger cli-release.yaml (no Actions recursion guard),
# which builds and publishes the `gh-teacher` and `gh-student` extensions.
# (Opening the Release PR also requires "Allow GitHub Actions to create and
# approve pull requests".)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cli-release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      # `cli--*` keys because component is "cli" (see release-please-config).
      release_created: ${{ steps.release.outputs['cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.CLI_RELEASE_PAT }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

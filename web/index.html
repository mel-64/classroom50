<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom 50</title>
    <script>
      // Anti-flash: apply the persisted (or OS-preferred) theme before the app
      // renders so there's no light->dark flicker. Mirrors resolveInitialTheme
      // in src/hooks/useTheme.ts.
      ;(function () {
        try {
          var stored = localStorage.getItem("classroom50:theme")
          var theme =
            stored === "sumi" || stored === "sumi-dark"
              ? stored
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "sumi-dark"
                : "sumi"
          document.documentElement.setAttribute("data-theme", theme)
        } catch (e) {}
      })()
      // Anti-flash: apply the persisted language's direction before the app
      // renders so RTL languages don't paint left-to-right first. The RTL
      // subtag list mirrors RTL_LANGS in src/i18n/direction.ts — keep in sync.
      ;(function () {
        try {
          var lang = localStorage.getItem("classroom50:lang")
          if (!lang) return
          document.documentElement.lang = lang
          var primary = lang.toLowerCase().split("-")[0]
          if (["ar", "he", "fa", "ur"].indexOf(primary) !== -1) {
            document.documentElement.dir = "rtl"
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
